name: Update README cards

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        # readme-tools/github-readme-stats-action@v1 branch pin
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=synthwave
          path: profile/stats.svg
          token: ${{ secrets.STATS_KEY }}
          
      - name: Generate top languages card
        # readme-tools/github-readme-stats-action@v1 branch pin
        uses: readme-tools/github-readme-stats-action@b4d2ef3b8051484b318d455163153b23a2b35fa2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&theme=synthwave
          path: profile/langs.svg
          token: ${{ secrets.STATS_KEY }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "stats: Update README cards" || exit 0
          git push
